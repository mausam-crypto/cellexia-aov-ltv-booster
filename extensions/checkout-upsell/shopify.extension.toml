api_version = "2025-07"

[[extensions]]
name = "Cellexia Checkout Upsell"
handle = "cellexia-checkout-upsell"
type = "ui_extension"
description = "Post-cart, pre-payment product offers (\"Complete your routine\") rendered as a checkout block."

  [[extensions.targeting]]
  module = "./src/Checkout.tsx"
  target = "purchase.checkout.block.render"

  [extensions.capabilities]
  api_access = true

  [[extensions.metafields]]
  namespace = "$app:cellexia"
  key = "config"

  [extensions.settings]

    [[extensions.settings.fields]]
    key = "title"
    type = "single_line_text_field"
    name = "Custom title"
    description = "Optional heading override. Leave empty to use the translated default (\"Complete your routine\")."
