api_version = "2025-07"
uid = "0102626b-7cdd-e1e3-b4a2-c705aa54ba4cef18dd66"

[[extensions]]
name = "Cellexia Checkout Upsell"
handle = "cellexia-checkout-upsell"
type = "ui_extension"
description = "Post-cart, pre-payment product offers (\"Complete your routine\") rendered as a checkout block."

  # Merchant-positioned block placement (drag anywhere in the editor).
  [[extensions.targeting]]
  module = "./src/Checkout.tsx"
  target = "purchase.checkout.block.render"

  # Alternative static placement adjacent to the Pay button (rendered
  # immediately before the actions area). Same module/UI — the merchant
  # chooses either placement in the checkout editor. Target verified
  # against RenderExtensionTargets in @shopify/ui-extensions 2025.7.
  [[extensions.targeting]]
  module = "./src/Checkout.tsx"
  target = "purchase.checkout.actions.render-before"

  [extensions.capabilities]
  api_access = true

  [[extensions.metafields]]
  namespace = "$app:cellexia"
  key = "config"

  [extensions.settings]

    [[extensions.settings.fields]]
    key = "title"
    type = "single_line_text_field"
    name = "Custom title"
    description = "Optional heading override. Leave empty to use the translated default (\"Complete your routine\")."
