api_version = "2025-07"

[[extensions]]
name = "Cellexia Order Protection"
handle = "cellexia-checkout-protection"
type = "ui_extension"
description = "Opt-in Order Protection toggle (loss, theft and transit damage) rendered as a checkout block."

  [[extensions.targeting]]
  module = "./src/Checkout.tsx"
  target = "purchase.checkout.block.render"

  [extensions.capabilities]
  api_access = true

  [[extensions.metafields]]
  namespace = "$app:cellexia"
  key = "config"
