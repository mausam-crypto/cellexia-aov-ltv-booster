databases:
  - name: cellexia-aov-ltv-booster-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: cellexia-aov-ltv-booster
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cellexia-aov-ltv-booster-db
          property: connectionString
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SCOPES
        value: read_products,write_products,read_publications,write_publications,read_orders,read_locales,read_translations,read_markets,read_metaobject_definitions,write_metaobject_definitions,read_metaobjects,write_metaobjects,read_files,write_files,read_themes
      - key: SHOPIFY_APP_URL
        sync: false
